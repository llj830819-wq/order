
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>點餐統計系統</title>
  
<style>
  #menuImage {
    width: 90%;
    max-width: 500px;
    margin-bottom: 20px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(0, 255, 240, 0.4);
  }

  #menuImage img {
    width: 100%;
    display: block;
  }
</style>

</head>
<body>

<h2>菜單</h2>

<div id="menuImage">
  <img src="images/image.jpg" alt="菜單圖片">
</div>

<h1>點餐系統</h1>

<form id="orderForm">
  <input type="text" id="name" placeholder="姓名" required />

  <select id="item"></select>

  <select id="sugar">
    <option>全糖</option>
    <option>半糖</option>
    <option>微糖</option>
    <option>無糖</option>
  </select>

  <select id="ice">
    <option>正常冰</option>
    <option>少冰</option>
    <option>去冰</option>
  </select>

  <input type="number" id="qty" value="1" min="1" />

  <textarea
    id="note"
    placeholder="備註（例如：少珍珠、分開裝）"
    rows="2"
  ></textarea>

  <button type="submit">加入訂單</button>
</form>

<hr>

<h2>訂單列表</h2>
<ul id="orderList"></ul>

  <h2>統計結果</h2>
  <div id="summary"></div>

  <!-- 載入 JS -->
  <script src="script.js"></script>

</body>
</html>
